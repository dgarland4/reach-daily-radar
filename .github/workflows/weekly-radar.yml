name: REACH Weekly Radar

on:
  schedule:
    - cron: '0 2 * * 4'  # Thursday 2:00 AM UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  reach-weekly-search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REACH_RADAR_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run weekly radar
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
            set -o pipefail
            python3 reach-weekly.py 2>&1 | tee reach-summary.txt

      - name: Commit updated discoveries file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reach-discoveries.md
          git diff --staged --quiet || git commit -m "chore: weekly radar update $(date +%Y-%m-%d)"
          git push

      - name: Post summary as job annotation
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('reach-summary.txt')) {
              const summary = fs.readFileSync('reach-summary.txt', 'utf8').slice(-3000);
              core.summary.addRaw('```\n' + summary + '\n```').write();
            }

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reach-weekly-summary
          path: reach-summary.txt
          retention-days: 30
