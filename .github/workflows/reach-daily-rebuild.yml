name: REACH Daily Radar — Rebuild & Deploy

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date label (e.g. March 16, 2026)'
        required: true
        default: ''
      commit_message:
        description: 'Commit message'
        required: false
        default: 'REACH Daily Radar update'

jobs:
  rebuild-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REACH_RADAR_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write rebuild script
        run: |
          python3 -c "import base64; open('radar_build.py','wb').write(base64.b64decode(''))"

      - name: Run rebuild
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATE_LABEL: ${{ github.event.inputs.date }}
        run: python3 radar_build.py

      - name: Commit and push to main
        run: |
          git config user.name "REACH Daily Radar"
          git config user.email "hello@narreach.com"
          git add index.html
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "${{ github.event.inputs.commit_message }}"
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.REACH_RADAR_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          commit_message: ${{ github.event.inputs.commit_message }}
