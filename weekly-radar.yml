name: REACH Daily Radar — Weekly Automation

on:
  schedule:
    # Thursday 2:00 AM UTC (= Wednesday 6pm PT, Thursday 10am CET)
    - cron: '0 2 * * 4'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  reach-weekly-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run REACH Weekly Automation
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        run: |
          python reach-weekly.py > reach-summary.txt 2>&1
          cat reach-summary.txt
      
      - name: Commit & push discoveries.md
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "REACH Radar Bot"
          git add reach-discoveries.md
          git commit -m "🤖 REACH Daily Radar: Weekly sweep $(date +%Y-%m-%d)" || true
          git push
      
      - name: Wait for 7am PST summary post
        run: |
          # Calculate seconds until 7:00 AM PST
          # Thursday 2am UTC = Wednesday 6pm PT
          # Need to wait until Thursday 3pm UTC (= Thursday 7am PT)
          
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_MIN=$(date -u +%M)
          TARGET_HOUR=15  # 3pm UTC = 7am PST
          
          if [ $CURRENT_HOUR -lt $TARGET_HOUR ]; then
            WAIT_HOURS=$((TARGET_HOUR - CURRENT_HOUR))
            WAIT_MIN=$((60 - CURRENT_MIN))
            WAIT_SECONDS=$((WAIT_HOURS * 3600 + WAIT_MIN * 60))
            echo "⏳ Waiting $((WAIT_SECONDS / 3600))h $((WAIT_SECONDS % 3600 / 60))m for 7am PST summary..."
            sleep $WAIT_SECONDS
          fi
      
      - name: Post summary to GitHub issue (7am PST)
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('reach-summary.txt', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `☀️ REACH Daily Radar — ${new Date().toLocaleDateString()}`,
              body: `## Weekly Sweep Complete\n\n\`\`\`\n${summary}\n\`\`\`\n\n📍 Dashboard: https://dgarland4.github.io/reach-daily-radar`,
              labels: ['reach-radar', 'automation']
            });
      
      - name: Upload summary as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: reach-summary
          path: reach-summary.txt

  trigger-website-rebuild:
    needs: reach-weekly-search
    runs-on: ubuntu-latest
    
    # Only run if new companies were written
    if: success()
    
    steps:
      - name: Trigger GitHub Pages rebuild
        run: |
          echo "✅ New companies written to Notion"
          echo "📍 GitHub Pages rebuild already configured to run at 7am PST"
          echo "🌐 Website will auto-update at https://dgarland4.github.io/reach-daily-radar"
